stages:
  - test
  - validate

variables:
  GOIMAGE: golang:1.24-alpine

test:
  stage: test
  image: $GOIMAGE
  script:
    - go test ./... -v -count=1

validate-tag:
  stage: validate
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - |
      if ! echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
        echo "ERROR: tag '$CI_COMMIT_TAG' does not match semver format vX.Y.Z"
        exit 1
      fi
      echo "valid semver tag: $CI_COMMIT_TAG"
